<div class="card h-100 position-relative">
    <img src="https://placehold.co/600x400" class="card-img-top" alt="...">
    <div class="card-body">
        <h5 class="card-title">{{ collection.name }}</h5>
        <span class="badge bg-secondary mb-2">{{ collection.category.value }}</span>
        <p class="card-text small text-muted">Created by {{ collection.creator.username }}</p>
        <a href="{{ url_for('collection', collection_id=collection.id) }}" class="btn btn-primary stretched-link">Play</a>
    </div>
</div>
